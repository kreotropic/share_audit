version = 1
SPDX-PackageName = "Share Audit Dashboard"
SPDX-PackageSupplier = "Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-PackageDownloadLocation = "https://github.com/kreotropic/share_audit"

# Files that cannot carry an in-file header (JSON has no comment syntax,
# lock files and binaries are machine-generated/opaque) are annotated here
# instead, per the REUSE.toml convention (reuse-tool >= 3.0). The currently
# installed reuse-tool (2.1.0) doesn't read this format yet -- .reuse/dep5
# is the one actually in effect for now; keep both in sync until upgrading.

[[annotations]]
path = ["package.json", "package-lock.json", "composer.json", "composer.lock"]
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = "screenshots/*.png"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = "img/*.svg"
precedence = "aggregate"
SPDX-FileCopyrightText = "2025 Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = ["l10n/*.js", "l10n/*.json"]
precedence = "aggregate"
SPDX-FileComment = "Generated by build/l10n.py from the source translations; do not edit the .js files by hand."
SPDX-FileCopyrightText = "2025 Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

[[annotations]]
path = "js/*.js"
precedence = "aggregate"
SPDX-FileComment = "Bundled build output generated by webpack from src/; not edited by hand."
SPDX-FileCopyrightText = "2025 Ricardo Ferreira <ricardo.ferreira@jofebar.com>"
SPDX-License-Identifier = "AGPL-3.0-or-later"

# js/*.LICENSE.txt is deliberately NOT annotated here: it's webpack's own
# extracted third-party notices (Nextcloud GmbH, Feross Aboukhadijeh, Vue
# contributors, ...) and already carries its own accurate inline SPDX tags
# per upstream dependency -- annotating it AGPL/Ricardo Ferreira here would
# misattribute copyright that isn't ours.
